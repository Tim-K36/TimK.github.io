baseURL = "https://Tim-K36.github.io/"
theme = "risotto"
title = "Tim's Docs"
author = "Tim Kilner"
locale = "en"
DefaultContentLanguage = "en"
enableInlineShortcodes = true
sectionPagesMenu = "main"

[pagination]
  pagerSize = 5

[params]
  noindex = false

[params.theme]
  palette = "tender"

[params.about]
  title = "About"
  description = "Research, Writeups and more." 
  logo = ""

[[params.socialLinks]]
  icon = "fa-brands fa-github"
  title = "GitHub"
  url = "https://github.com/Tim-K36"

[menu]
  [[menu.main]]
    identifier = "about"
    name = "About"
    url = "/about/"
    weight = 10
  [[menu.main]]
    identifier = "writeups"
    name = "Writeups"
    url = "/writeups/"
    weight = 20
  [[menu.main]]
    identifier = "blog"
    name = "Blog"
    url = "/blog/"
    weight = 30

[taxonomies]
  category = "categories"
  tag = "tags"
  series = "series"

[markup.goldmark.renderer]
  unsafe = true

[markup]
  [markup.tableOfContents]
    startLevel = 2
    endLevel = 3
    ordered = true