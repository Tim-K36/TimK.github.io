baseURL = "https://Tim-K36.github.io/"
locale = "en-us"
title = "Tim's Docs"
theme = "risotto"
disableKinds = ["taxonomy", "term"]


[params]
  author = "Tim Kilner"
  description = "Research and Writeups"

  [[params.socialLinks]]
  icon = "fa-brands fa-github"
  title = "GitHub"
  url = "https://github.com/Tim-K36"

[menu]
  [[menu.main]]
    identifier = "home"
    name = "Home"
    url = "/"
    weight = 10
  [[menu.main]]
    identifier = "writeups"
    name = "Writeups"
    url = "/writeups/"
    weight = 30
  [[menu.main]]
    identifier = "posts"
    name = "Blog"
    url = "/posts/"
    weight = 40

[taxonomies]
  category = "categories"
  tag = "tags"
  series = "series"

[markup.goldmark.renderer]
  unsafe = true

[markup]
  [markup.tableOfContents]
    startLevel = 2
    endLevel = 3
    ordered = true

[privacy]
  [privacy.youtube]
    disabled = false
    privacyEnhanced = true

[services]
  [services.x]
    disableInlineCSS = true

